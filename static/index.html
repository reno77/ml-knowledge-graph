<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML Knowledge Graph — 3D</title>
  <script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>
  <script src="https://unpkg.com/three@0.155.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three-spritetext@1.8.1/dist/three-spritetext.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050510; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
    #graph { width: 100vw; height: 100vh; }

    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: linear-gradient(180deg, rgba(5,5,16,0.97) 60%, transparent 100%);
      padding: 12px 20px 20px;
    }
    #header h1 { font-size: 20px; font-weight: 700; color: #7ecfff; }
    #header p  { font-size: 11px; color: #445; margin-top: 2px; }

    /* ── Side panel ─────────────────────────────────────────────── */
    #panel {
      position: fixed; top: 60px; right: 0; bottom: 0; z-index: 100;
      width: 220px; background: rgba(8,8,22,0.97);
      border-left: 1px solid #1a1a3a;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #panel-tabs {
      display: flex; border-bottom: 1px solid #1a1a3a;
    }
    .ptab {
      flex: 1; padding: 8px 0; text-align: center;
      font-size: 11px; color: #556; cursor: pointer;
      text-transform: uppercase; letter-spacing: 1px;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .ptab.active { color: #7ecfff; border-bottom-color: #7ecfff; }
    .ptab-content { display: none; flex: 1; overflow-y: auto; padding: 12px 14px; }
    .ptab-content.active { display: block; }

    .section-title {
      font-size: 10px; color: #7ecfff; text-transform: uppercase;
      letter-spacing: 1.5px; margin: 10px 0 6px;
    }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      margin: 4px 0;
    }
    .toggle-label { font-size: 12px; color: #aab; }
    .toggle-switch {
      position: relative; width: 32px; height: 17px; cursor: pointer;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0; background: #1a1a3a;
      border-radius: 17px; transition: 0.2s;
    }
    .toggle-slider:before {
      content: ''; position: absolute;
      width: 11px; height: 11px; left: 3px; bottom: 3px;
      background: #556; border-radius: 50%; transition: 0.2s;
    }
    input:checked + .toggle-slider { background: #1a4da0; }
    input:checked + .toggle-slider:before { background: #7ecfff; transform: translateX(15px); }

    .cat-row {
      display: flex; align-items: center; justify-content: space-between;
      margin: 5px 0; cursor: pointer;
    }
    .cat-dot-label { display: flex; align-items: center; gap: 8px; }
    .cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .cat-name { font-size: 12px; color: #bbc; }
    .cat-count { font-size: 10px; color: #445; }

    .level-row {
      display: flex; align-items: center; justify-content: space-between;
      margin: 4px 0; font-size: 12px; color: #aab; cursor: pointer;
    }
    .level-badge {
      font-size: 10px; color: #445; background: #0d0d22;
      border-radius: 4px; padding: 1px 6px;
    }

    /* ── Node info panel ────────────────────────────────────────── */
    #node-info {
      position: fixed; bottom: 16px; left: 16px; z-index: 100;
      background: rgba(8,8,22,0.97); border: 1px solid #1a1a3a;
      border-radius: 12px; padding: 14px 16px; max-width: 280px;
      display: none;
    }
    #node-info .ni-name  { font-size: 15px; font-weight: 700; color: #7ecfff; }
    #node-info .ni-cat   { font-size: 11px; color: #888; margin-top: 3px; }
    #node-info .ni-level { font-size: 11px; color: #445; margin-top: 2px; }
    #node-info .ni-links { font-size: 11px; color: #99aacc; margin-top: 8px;
                           border-top: 1px solid #1a1a3a; padding-top: 8px;
                           max-height: 120px; overflow-y: auto; }
    #node-info .ni-close { float: right; cursor: pointer; color: #446; font-size: 14px; }

    #hint { position: fixed; bottom: 16px; right: 230px; z-index: 100;
            font-size: 10px; color: #224; text-align: right; line-height: 2; transition: right 0.3s; }
    #hint.panel-hidden { right: 16px; }

    #panel-toggle {
      position: fixed; top: 50%; right: 220px; transform: translateY(-50%);
      z-index: 101; width: 20px; height: 48px;
      background: rgba(10,10,28,0.97); border: 1px solid #1a1a3a;
      border-right: none; border-radius: 8px 0 0 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #7ecfff; font-size: 12px;
      transition: right 0.3s; user-select: none;
    }
    #panel-toggle.panel-hidden { right: 0; border-radius: 8px 0 0 8px; }
    #panel.hidden { transform: translateX(100%); }
    #panel { transition: transform 0.3s ease; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0a1a; }
    ::-webkit-scrollbar-thumb { background: #1a1a3a; border-radius: 4px; }
  </style>
</head>
<body>

<div id="header">
  <h1>🧠 ML Knowledge Graph</h1>
  <p id="stat-line">Loading…</p>
</div>

<!-- Side panel -->
<div id="panel">
  <div id="panel-tabs">
    <div class="ptab active" data-tab="filters">Filters</div>
    <div class="ptab" data-tab="categories">Categories</div>
    <div class="ptab" data-tab="levels">Levels</div>
  </div>

  <!-- Filters tab -->
  <div class="ptab-content active" id="tab-filters">
    <div class="section-title">Display</div>
    <div class="toggle-row">
      <span class="toggle-label">Node Labels</span>
      <label class="toggle-switch"><input type="checkbox" id="showLabels" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Connections</span>
      <label class="toggle-switch"><input type="checkbox" id="showLinks" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Arrows</span>
      <label class="toggle-switch"><input type="checkbox" id="showArrows" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Particles</span>
      <label class="toggle-switch"><input type="checkbox" id="showParticles" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Glow Effect</span>
      <label class="toggle-switch"><input type="checkbox" id="showGlow" checked><span class="toggle-slider"></span></label>
    </div>

    <div class="section-title" style="margin-top:14px">Connection Filter</div>
    <div class="toggle-row">
      <span class="toggle-label">Same-category</span>
      <label class="toggle-switch"><input type="checkbox" id="linkSameCat" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Cross-category</span>
      <label class="toggle-switch"><input type="checkbox" id="linkCrossCat" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Level up (↑)</span>
      <label class="toggle-switch"><input type="checkbox" id="linkUp" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Level same</span>
      <label class="toggle-switch"><input type="checkbox" id="linkSame" checked><span class="toggle-slider"></span></label>
    </div>

    <div class="section-title" style="margin-top:14px">Quick Categories</div>
    <div id="cat-quick"></div>

    <div class="section-title" style="margin-top:14px">Actions</div>
    <button onclick="resetAll()" style="width:100%;padding:6px;background:#0d1a3a;border:1px solid #1a2a4a;color:#7ecfff;border-radius:6px;cursor:pointer;font-size:12px;margin-bottom:6px;">Reset All Filters</button>
    <button onclick="selectAll()" style="width:100%;padding:6px;background:#0d1a3a;border:1px solid #1a2a4a;color:#7ecfff;border-radius:6px;cursor:pointer;font-size:12px;">Clear Highlight</button>
  </div>

  <!-- Categories tab -->
  <div class="ptab-content" id="tab-categories">
    <div class="section-title">Toggle Categories</div>
    <div id="cat-list"></div>
  </div>

  <!-- Levels tab -->
  <div class="ptab-content" id="tab-levels">
    <div class="section-title">Toggle Levels</div>
    <div id="level-list"></div>
  </div>
</div>

<!-- Node info -->
<div id="node-info">
  <span class="ni-close" onclick="this.parentElement.style.display='none'">✕</span>
  <div class="ni-name"  id="ni-name"></div>
  <div class="ni-cat"   id="ni-cat"></div>
  <div class="ni-level" id="ni-level"></div>
  <div class="ni-links" id="ni-links"></div>
</div>

<div id="panel-toggle" title="Toggle panel">◀</div>
<div id="hint">Left drag · Scroll zoom<br>Right drag · Click node</div>

<div id="graph"></div>

<script>
const LEVEL_LABELS = ["Foundations","Core Concepts","Classical ML","Intermediate","Deep Learning","Advanced","Expert"];

// ── State ────────────────────────────────────────────────────────────────
const state = {
  labels: true, links: true, arrows: true, particles: true, glow: true,
  linkSameCat: true, linkCrossCat: true, linkUp: true, linkSame: true,
  hiddenCats: new Set(), hiddenLevels: new Set(),
  highlighted: null, highlightNodes: new Set(), highlightLinks: new Set(),
};

fetch('graph.json').then(r => r.json()).then(data => {
  const allNodes = data.nodes.map(n => ({
    id: n.id, label: n.label, level: n.level,
    category: n.category, color: n.color,
    val: n.level <= 1 ? 6 : n.level >= 5 ? 5 : 3,
  }));
  const allLinks = data.edges.map(e => ({ source: e.from, target: e.to }));

  const nodeMap = {};
  allNodes.forEach(n => nodeMap[n.id] = n);

  // Stats
  document.getElementById('stat-line').textContent =
    `${allNodes.length} concepts · ${allLinks.length} prerequisites · Click to explore`;

  // ── Filtered graph data ──────────────────────────────────────────────
  function getFilteredData() {
    const visNodes = allNodes.filter(n =>
      !state.hiddenCats.has(n.category) && !state.hiddenLevels.has(n.level)
    );
    const visNodeIds = new Set(visNodes.map(n => n.id));

    const visLinks = allLinks.filter(l => {
      const sid = typeof l.source==='object'?l.source.id:l.source;
      const tid = typeof l.target==='object'?l.target.id:l.target;
      if (!visNodeIds.has(sid) || !visNodeIds.has(tid)) return false;
      if (!state.links) return false;
      const sn = nodeMap[sid], tn = nodeMap[tid];
      const sameCat = sn && tn && sn.category === tn.category;
      const lvlDiff = tn && sn ? tn.level - sn.level : 0;
      if (sameCat && !state.linkSameCat) return false;
      if (!sameCat && !state.linkCrossCat) return false;
      if (lvlDiff > 0 && !state.linkUp) return false;
      if (lvlDiff === 0 && !state.linkSame) return false;
      return true;
    });

    return { nodes: visNodes, links: visLinks };
  }

  // ── 3D Graph ─────────────────────────────────────────────────────────
  const Graph = ForceGraph3D()(document.getElementById('graph'))
    .backgroundColor('#050510')
    .nodeLabel('')
    .nodeVal(n => n.val)
    .nodeOpacity(0.92)
    .nodeResolution(16)
    .linkDirectionalArrowRelPos(1)
    .linkDirectionalParticleSpeed(0.005)
    .linkDirectionalParticleWidth(2)
    .linkDirectionalParticleColor(() => '#7ecfff')
    .d3Force('spiral', (() => {
      let nodes = [];
      const force = alpha => {
        const byLevel = {};
        nodes.forEach(n => (byLevel[n.level]=byLevel[n.level]||[]).push(n));
        nodes.forEach(n => {
          const group = byLevel[n.level];
          const idx   = group.indexOf(n);
          const total = group.length;
          const arms  = 3;
          const armIdx  = idx % arms;
          const posInArm = Math.floor(idx / arms);
          const t = posInArm / Math.max(1, Math.ceil(total / arms));
          const angle = (armIdx/arms)*Math.PI*2 + t*Math.PI*2*2.5;
          const r = 60 + n.level*55 + t*40;
          n.vx = (n.vx||0) + (r*Math.cos(angle) - (n.x||0))*alpha*0.08;
          n.vy = (n.vy||0) + (r*Math.sin(angle) - (n.y||0))*alpha*0.08;
          n.vz = (n.vz||0) + ((n.level-3)*70+(idx%3-1)*15 - (n.z||0))*alpha*0.08;
        });
      };
      force.initialize = ns => { nodes = ns; };
      return force;
    })());

  function refreshGraph() {
    const fd = getFilteredData();
    Graph.graphData(fd);
    refreshVisuals();
  }

  function refreshVisuals() {
    Graph
      .nodeThreeObject(n => buildNodeObj(n))
      .nodeThreeObjectExtend(false)
      .linkColor(l => linkColor(l))
      .linkWidth(l => linkWidth(l))
      .linkDirectionalArrowLength(state.arrows ? 5 : 0)
      .linkDirectionalParticles(l => linkParticles(l));
  }

  function buildNodeObj(n) {
    const isDimmed = state.highlighted && !state.highlightNodes.has(n.id);
    const group = new THREE.Group();

    // Glow spheres
    if (state.glow && !isDimmed) {
      [[2.6, 0.10], [1.7, 0.20]].forEach(([sm, op]) => {
        group.add(new THREE.Mesh(
          new THREE.SphereGeometry(n.val*1.5*sm, 12, 12),
          new THREE.MeshLambertMaterial({ color: n.color, transparent: true, opacity: op })
        ));
      });
    }

    // Main sphere
    group.add(new THREE.Mesh(
      new THREE.SphereGeometry(n.val * 1.5, 16, 16),
      new THREE.MeshLambertMaterial({
        color: n.color,
        transparent: true,
        opacity: isDimmed ? 0.08 : 0.92,
      })
    ));

    // Label
    if (state.labels && !isDimmed) {
      const sp = new SpriteText(n.label);
      sp.color = '#ffffff';
      sp.textHeight = n.level <= 1 ? 4.5 : 3.5;
      sp.fontFace = 'Segoe UI, sans-serif';
      sp.fontWeight = '600';
      sp.backgroundColor = 'rgba(5,5,16,0.72)';
      sp.padding = 1.5;
      sp.borderRadius = 3;
      sp.position.y = n.val * 1.5 + 5;
      group.add(sp);
    }
    return group;
  }

  function getSrcTgt(l) {
    return [
      typeof l.source==='object'?l.source.id:l.source,
      typeof l.target==='object'?l.target.id:l.target
    ];
  }

  function linkColor(l) {
    const [s,t] = getSrcTgt(l);
    const key = `${s}-${t}`;
    if (state.highlighted) {
      return state.highlightLinks.has(key) ? '#7ecfff' : 'rgba(20,20,50,0.06)';
    }
    const sn = nodeMap[s], tn = nodeMap[t];
    if (sn && tn && sn.category === tn.category) return sn.color+'99';
    return 'rgba(120,150,200,0.28)';
  }

  function linkWidth(l) {
    const [s,t] = getSrcTgt(l);
    return state.highlightLinks.has(`${s}-${t}`) ? 2.5 : 0.5;
  }

  function linkParticles(l) {
    if (!state.particles) return 0;
    const [s,t] = getSrcTgt(l);
    return state.highlightLinks.has(`${s}-${t}`) ? 5 : 0;
  }

  // ── Node click ────────────────────────────────────────────────────────
  Graph.onNodeClick(node => {
    if (state.highlighted === node.id) {
      state.highlighted = null;
      state.highlightNodes.clear(); state.highlightLinks.clear();
      document.getElementById('node-info').style.display = 'none';
    } else {
      state.highlighted = node.id;
      state.highlightNodes.clear(); state.highlightLinks.clear();
      state.highlightNodes.add(node.id);
      const fd = Graph.graphData();
      fd.links.forEach(l => {
        const [s,t] = getSrcTgt(l);
        if (s===node.id||t===node.id) {
          state.highlightNodes.add(s); state.highlightNodes.add(t);
          state.highlightLinks.add(`${s}-${t}`);
        }
      });
      showNodeInfo(node, fd);
      const {x=0,y=0,z=0} = node;
      Graph.cameraPosition({x:x+80,y:y+80,z:z+80}, node, 800);
    }
    refreshVisuals();
  });

  function showNodeInfo(node, fd) {
    const prereqs = fd.links
      .filter(l => getSrcTgt(l)[1]===node.id).map(l=>getSrcTgt(l)[0]);
    const enables = fd.links
      .filter(l => getSrcTgt(l)[0]===node.id).map(l=>getSrcTgt(l)[1]);
    document.getElementById('ni-name').textContent = node.label;
    document.getElementById('ni-cat').textContent  = '📁 '+node.category.charAt(0).toUpperCase()+node.category.slice(1);
    document.getElementById('ni-level').textContent= '📊 Level '+node.level+': '+(LEVEL_LABELS[node.level]||'');
    document.getElementById('ni-links').innerHTML  =
      (prereqs.length ? `<b>Requires (${prereqs.length}):</b> ${prereqs.join(', ')}<br>` : '') +
      (enables.length ? `<b>Enables (${enables.length}):</b> ${enables.join(', ')}` : '');
    document.getElementById('node-info').style.display = 'block';
  }

  // ── Tabs ─────────────────────────────────────────────────────────────
  document.querySelectorAll('.ptab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.ptab-content').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
    });
  });

  // ── Toggle controls ──────────────────────────────────────────────────
  const toggles = {
    showLabels:    v => { state.labels = v; refreshVisuals(); },
    showLinks:     v => { state.links  = v; refreshGraph(); },
    showArrows:    v => { state.arrows = v; refreshVisuals(); },
    showParticles: v => { state.particles = v; refreshVisuals(); },
    showGlow:      v => { state.glow = v; refreshVisuals(); },
    linkSameCat:   v => { state.linkSameCat = v; refreshGraph(); },
    linkCrossCat:  v => { state.linkCrossCat = v; refreshGraph(); },
    linkUp:        v => { state.linkUp = v; refreshGraph(); },
    linkSame:      v => { state.linkSame = v; refreshGraph(); },
  };
  Object.entries(toggles).forEach(([id, fn]) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('change', e => fn(e.target.checked));
  });

  // ── Category toggles ─────────────────────────────────────────────────
  const catCounts = {};
  allNodes.forEach(n => catCounts[n.category]=(catCounts[n.category]||0)+1);
  const catList  = document.getElementById('cat-list');
  const catQuick = document.getElementById('cat-quick');
  const catInputs = {}; // track all inputs for sync

  Object.entries(data.categories).forEach(([cat, color]) => {
    const label = cat.charAt(0).toUpperCase()+cat.slice(1);
    const count = catCounts[cat]||0;

    // Full row (Categories tab)
    const row = document.createElement('div');
    row.className = 'cat-row';
    row.innerHTML = `
      <div class="cat-dot-label">
        <div class="cat-dot" style="background:${color}"></div>
        <span class="cat-name">${label}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="cat-count">${count}</span>
        <label class="toggle-switch"><input type="checkbox" checked data-cat="${cat}" data-role="full"><span class="toggle-slider"></span></label>
      </div>`;
    catList.appendChild(row);

    // Quick row (Filters tab)
    const qrow = document.createElement('div');
    qrow.className = 'cat-row';
    qrow.innerHTML = `
      <div class="cat-dot-label">
        <div class="cat-dot" style="background:${color}"></div>
        <span class="cat-name" style="font-size:11px">${label}</span>
      </div>
      <label class="toggle-switch"><input type="checkbox" checked data-cat="${cat}" data-role="quick"><span class="toggle-slider"></span></label>`;
    catQuick.appendChild(qrow);

    // Sync both inputs together
    catInputs[cat] = [row.querySelector('input'), qrow.querySelector('input')];
    catInputs[cat].forEach(inp => {
      inp.addEventListener('change', e => {
        const checked = e.target.checked;
        catInputs[cat].forEach(i => i.checked = checked); // sync pair
        checked ? state.hiddenCats.delete(cat) : state.hiddenCats.add(cat);
        refreshGraph();
      });
    });
  });

  // ── Level toggles ────────────────────────────────────────────────────
  const lvlCounts = {};
  allNodes.forEach(n => lvlCounts[n.level]=(lvlCounts[n.level]||0)+1);
  const lvlList = document.getElementById('level-list');
  [...new Set(allNodes.map(n=>n.level))].sort().forEach(lv => {
    const row = document.createElement('div');
    row.className = 'level-row';
    row.innerHTML = `
      <span>Lv${lv}: ${LEVEL_LABELS[lv]||'Expert+'}</span>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="level-badge">${lvlCounts[lv]||0}</span>
        <label class="toggle-switch"><input type="checkbox" checked data-level="${lv}"><span class="toggle-slider"></span></label>
      </div>`;
    row.querySelector('input').addEventListener('change', e => {
      const lvl = parseInt(e.target.dataset.level);
      e.target.checked ? state.hiddenLevels.delete(lvl) : state.hiddenLevels.add(lvl);
      refreshGraph();
    });
    lvlList.appendChild(row);
  });

  // ── Global actions ────────────────────────────────────────────────────
  window.resetAll = () => {
    state.hiddenCats.clear(); state.hiddenLevels.clear();
    document.querySelectorAll('[data-cat],[data-level]').forEach(el => el.checked=true);
    // Reset all display toggles too
    ['showLabels','showLinks','showArrows','showParticles','showGlow',
     'linkSameCat','linkCrossCat','linkUp','linkSame'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.checked=true; }
    });
    Object.assign(state, {labels:true,links:true,arrows:true,particles:true,glow:true,
      linkSameCat:true,linkCrossCat:true,linkUp:true,linkSame:true});
    refreshGraph();
  };
  window.selectAll = () => {
    state.highlighted = null; state.highlightNodes.clear(); state.highlightLinks.clear();
    document.getElementById('node-info').style.display = 'none';
    refreshVisuals();
  };

  // Click canvas bg to deselect
  document.getElementById('graph').addEventListener('click', e => {
    if (e.target.tagName==='CANVAS') {
      state.highlighted=null; state.highlightNodes.clear(); state.highlightLinks.clear();
      document.getElementById('node-info').style.display='none';
      refreshVisuals();
    }
  });

  // ── Panel show/hide ───────────────────────────────────────────────────
  let panelVisible = true;
  const panelEl   = document.getElementById('panel');
  const toggleBtn = document.getElementById('panel-toggle');
  const hintEl    = document.getElementById('hint');
  toggleBtn.addEventListener('click', () => {
    panelVisible = !panelVisible;
    panelEl.classList.toggle('hidden', !panelVisible);
    toggleBtn.textContent = panelVisible ? '◀' : '▶';
    toggleBtn.style.right = panelVisible ? '220px' : '0';
    toggleBtn.style.borderRadius = panelVisible ? '8px 0 0 8px' : '8px 0 0 8px';
    hintEl.classList.toggle('panel-hidden', !panelVisible);
  });

  // ── Initial render ────────────────────────────────────────────────────
  refreshGraph();
});
</script>
</body>
</html>
