<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ML Knowledge Graph — 3D</title>
  <script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050510; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

    #graph { width: 100vw; height: 100vh; }

    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: linear-gradient(180deg, rgba(5,5,16,0.95) 0%, rgba(5,5,16,0) 100%);
      padding: 16px 24px;
    }
    #header h1 { font-size: 22px; font-weight: 700; color: #7ecfff; letter-spacing: 0.5px; }
    #header p  { font-size: 12px; color: #556; margin-top: 2px; }

    #controls {
      position: fixed; top: 72px; right: 16px; z-index: 100;
      background: rgba(10,10,28,0.92); border: 1px solid #1a1a3a;
      border-radius: 12px; padding: 14px 16px; min-width: 190px;
      backdrop-filter: blur(8px);
    }
    #controls h3 {
      font-size: 11px; color: #7ecfff; margin-bottom: 10px;
      text-transform: uppercase; letter-spacing: 1.5px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 9px;
      margin: 6px 0; cursor: pointer; transition: opacity 0.2s;
    }
    .legend-item:hover { opacity: 0.75; }
    .legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 12px; color: #bbc; }

    #node-info {
      position: fixed; bottom: 24px; left: 24px; z-index: 100;
      background: rgba(10,10,28,0.92); border: 1px solid #1a1a3a;
      border-radius: 12px; padding: 14px 18px; min-width: 220px;
      backdrop-filter: blur(8px); display: none;
    }
    #node-info .ni-name  { font-size: 16px; font-weight: 700; color: #7ecfff; }
    #node-info .ni-cat   { font-size: 12px; color: #888; margin-top: 4px; }
    #node-info .ni-level { font-size: 11px; color: #555; margin-top: 2px; }
    #node-info .ni-links { font-size: 12px; color: #aac; margin-top: 8px; border-top: 1px solid #1a1a3a; padding-top: 8px; }

    #hint {
      position: fixed; bottom: 16px; right: 16px; z-index: 100;
      font-size: 11px; color: #334; text-align: right; line-height: 1.8;
    }
  </style>
</head>
<body>

<div id="header">
  <h1>🧠 ML Knowledge Graph</h1>
  <p>31 concepts · 30 prerequisites · Interactive 3D</p>
</div>

<div id="controls">
  <h3>Categories</h3>
  <div id="legend"></div>
</div>

<div id="node-info">
  <div class="ni-name"  id="ni-name"></div>
  <div class="ni-cat"   id="ni-cat"></div>
  <div class="ni-level" id="ni-level"></div>
  <div class="ni-links" id="ni-links"></div>
</div>

<div id="hint">
  Left drag · Scroll zoom<br>
  Right drag · Click node
</div>

<div id="graph"></div>

<script>
const LEVEL_LABELS = ["Foundations","Core Concepts","Classical ML","Intermediate","Deep Learning","Advanced","Expert"];

fetch('graph.json').then(r => r.json()).then(data => {
  // Build vis-compatible node/link format
  const graphData = {
    nodes: data.nodes.map(n => ({
      id: n.id,
      label: n.label,
      level: n.level,
      category: n.category,
      color: n.color,
      val: n.level <= 1 ? 6 : n.level >= 5 ? 5 : 3,
    })),
    links: data.edges.map(e => ({
      source: e.from,
      target: e.to,
    }))
  };

  const nodeMap = {};
  graphData.nodes.forEach(n => nodeMap[n.id] = n);

  // Build adjacency for highlight
  const neighbors = {};
  graphData.links.forEach(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    (neighbors[s] = neighbors[s]||new Set()).add(t);
    (neighbors[t] = neighbors[t]||new Set()).add(s);
  });

  let highlightNodes = new Set();
  let highlightLinks = new Set();
  let selectedNode   = null;

  const Graph = ForceGraph3D()
    (document.getElementById('graph'))
    .backgroundColor('#050510')
    .graphData(graphData)
    .nodeLabel('')
    .nodeColor(n => {
      if (!highlightNodes.size) return n.color;
      return highlightNodes.has(n.id) ? n.color : '#111122';
    })
    .nodeVal(n => n.val)
    .nodeOpacity(0.92)
    .nodeResolution(16)

    // Glowing particles on links
    .linkColor(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      if (!highlightLinks.size) return 'rgba(100,130,170,0.35)';
      return highlightLinks.has(`${s}-${t}`) ? '#7ecfff' : 'rgba(20,20,40,0.15)';
    })
    .linkWidth(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      return highlightLinks.has(`${s}-${t}`) ? 2 : 0.6;
    })
    .linkDirectionalArrowLength(4)
    .linkDirectionalArrowRelPos(1)
    .linkDirectionalParticles(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      return highlightLinks.has(`${s}-${t}`) ? 4 : 0;
    })
    .linkDirectionalParticleSpeed(0.005)
    .linkDirectionalParticleColor(() => '#7ecfff')

    // Level-based z positioning (hierarchy feel)
    .d3Force('z', (() => {
      let nodes = [];
      const force = () => nodes.forEach(n => { n.fz = (n.level - 3) * 60; });
      force.initialize = ns => { nodes = ns; };
      return force;
    })())

    .onNodeClick(node => {
      if (selectedNode === node.id) {
        // deselect
        selectedNode = null;
        highlightNodes.clear();
        highlightLinks.clear();
        document.getElementById('node-info').style.display = 'none';
        Graph.nodeColor(Graph.nodeColor()).linkColor(Graph.linkColor()).linkWidth(Graph.linkWidth());
        return;
      }
      selectedNode = node.id;

      // Build highlight sets
      highlightNodes.clear(); highlightLinks.clear();
      highlightNodes.add(node.id);
      graphData.links.forEach(l => {
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        if (s === node.id || t === node.id) {
          highlightNodes.add(s); highlightNodes.add(t);
          highlightLinks.add(`${s}-${t}`);
        }
      });

      // Info panel
      const prereqs = graphData.links
        .filter(l => (typeof l.target==='object'?l.target.id:l.target) === node.id)
        .map(l => typeof l.source==='object'?l.source.id:l.source);
      const leads_to = graphData.links
        .filter(l => (typeof l.source==='object'?l.source.id:l.source) === node.id)
        .map(l => typeof l.target==='object'?l.target.id:l.target);

      document.getElementById('ni-name').textContent  = node.label;
      document.getElementById('ni-cat').textContent   = '📁 ' + node.category.charAt(0).toUpperCase()+node.category.slice(1);
      document.getElementById('ni-level').textContent = '📊 Level ' + node.level + ': ' + (LEVEL_LABELS[node.level]||'');
      document.getElementById('ni-links').innerHTML   =
        (prereqs.length  ? `<b>Requires:</b> ${prereqs.join(', ')}<br>`   : '') +
        (leads_to.length ? `<b>Enables:</b> ${leads_to.join(', ')}` : '');
      document.getElementById('node-info').style.display = 'block';

      // Refresh colors
      Graph.nodeColor(Graph.nodeColor())
           .linkColor(Graph.linkColor())
           .linkWidth(Graph.linkWidth())
           .linkDirectionalParticles(Graph.linkDirectionalParticles());

      // Fly camera to node
      const dist = 80;
      const { x=0, y=0, z=0 } = node;
      Graph.cameraPosition({ x: x+dist, y: y+dist, z: z+dist }, node, 800);
    });

  // Legend
  const legend = document.getElementById('legend');
  Object.entries(data.categories).forEach(([cat, color]) => {
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.innerHTML = `<div class="legend-dot" style="background:${color}"></div>
                     <span class="legend-label">${cat.charAt(0).toUpperCase()+cat.slice(1)}</span>`;
    div.addEventListener('click', () => {
      selectedNode = null;
      highlightNodes.clear(); highlightLinks.clear();
      graphData.nodes.filter(n => n.category===cat).forEach(n => highlightNodes.add(n.id));
      Graph.nodeColor(Graph.nodeColor()).linkColor(Graph.linkColor()).linkWidth(Graph.linkWidth());
      document.getElementById('node-info').style.display = 'none';
    });
    legend.appendChild(div);
  });

  // Click background = deselect
  document.getElementById('graph').addEventListener('click', e => {
    if (e.target.tagName === 'CANVAS') {
      selectedNode = null;
      highlightNodes.clear(); highlightLinks.clear();
      Graph.nodeColor(Graph.nodeColor()).linkColor(Graph.linkColor()).linkWidth(Graph.linkWidth());
      document.getElementById('node-info').style.display = 'none';
    }
  });
});
</script>
</body>
</html>
